<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>App Empresa</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;}

body{
  font-family:-apple-system;
  margin:0;
  background:#f2f2f7;
}

.container{
  padding:16px;
  padding-bottom:120px;
}

/* NAVBAR */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
}

nav button{
  background:none;
  border:none;
  font-size:22px;
  color:#999;
}

nav button.active{
  color:#007AFF;
}

/* UI */
select,input,button{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ccc;
}

.card{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

.check{
  display:flex;
  align-items:center;
  margin-bottom:8px;
}
.check input{
  width:auto;
  margin-right:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- IMPRESSORAS -->
<div id="impressoras">

<h2>Impressoras</h2>

<input id="equipamento" placeholder="Equipamento">
<input id="localizacao" placeholder="Localização">
<input id="cor" placeholder="Cor">
<input type="date" id="data">

<button onclick="disponivel()">Disponível</button>

<h3>Stock</h3>
<div id="listaStock"></div>

<h3>Histórico</h3>
<div id="listaHistorico"></div>

</div>

<!-- INSTALAÇÃO PC -->
<div id="instalacao" style="display:none">

<h2>Instalação Computador</h2>

<input id="nomePC" placeholder="Nome do Computador">

<div id="checklist"></div>

<button onclick="guardarInstalacao()">Guardar</button>

</div>

<!-- HISTÓRICO PC -->
<div id="historicoPC" style="display:none">

<h2>Histórico Instalações</h2>

<div id="listaPC"></div>

</div>

</div>

<nav>
<button onclick="mudarPagina('impressoras', this)">🖨️</button>
<button onclick="mudarPagina('instalacao', this)">💻</button>
<button onclick="mudarPagina('historicoPC', this)">📋</button>
</nav>

<script src="app.js"></script>

</body>
</html>
