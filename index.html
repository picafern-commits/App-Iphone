<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Toner App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.dark{background:#111;color:white;}

.container{padding:20px;padding-bottom:80px;}

.card{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

.dark .card{background:#1e1e1e;}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#222;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

nav button{
  background:none;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- REGISTO -->
<div id="registo">

<h2>Registo Toner</h2>

<select id="equipamento">
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option>Ilha 1</option>
<option>Ilha 2</option>
<option>Ilha 3</option>
</select>

<select id="cor">
<option>Preto</option>
<option>Cyan</option>
<option>Magenta</option>
<option>Amarelo</option>
</select>

<button onclick="registarToner()">Guardar</button>

</div>

<!-- STOCK -->
<div id="stock" style="display:none">

<h2>Stock</h2>

<input id="pesquisa" onkeyup="filtrarStock()" placeholder="Pesquisar">

<div id="listaStock"></div>

</div>

</div>

<nav>
<button onclick="mudarPagina('registo')">➕</button>
<button onclick="mudarPagina('stock')">📦</button>
<button onclick="toggleDark()">🌙</button>
</nav>

<script type="module" src="app.js"></script>

</body>
</html>
