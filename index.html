<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gestão Toners PRO</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="loginUser()">Entrar</button>
  <button onclick="registarUser()">Criar Conta</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h1>Gestão Toners</h1>
<button onclick="toggleDark()">🌙</button>

<nav>
  <button onclick="mudarPagina('dashboard')">Dashboard</button>
  <button onclick="mudarPagina('registo')">Registo</button>
  <button onclick="mudarPagina('stock')">Stock</button>
  <button onclick="mudarPagina('manutencao')">Manutenção</button>
  <button onclick="mudarPagina('historico')">Histórico</button>
</nav>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="cards">
    <div class="card"><h3 id="totalStock">0</h3><p>Toners</p></div>
    <div class="card"><h3 id="totalMan">0</h3><p>Manutenções</p></div>
    <div class="card"><h3 id="pretos">0</h3><p>Pretos</p></div>
  </div>
</div>

<!-- REGISTO -->
<div id="registo" style="display:none">
  <select id="equipamento">
    <option>P3155DN</option>
    <option>TASKalfa_255ci</option>
    <option>PA5500x</option>
  </select>

  <select id="localizacao">
    <option>Ilha 1</option>
    <option>Ilha 2</option>
    <option>Ilha 3</option>
  </select>

  <select id="cor">
    <option>Preto</option>
    <option>Amarelo</option>
    <option>Azul</option>
    <option>Vermelho</option>
  </select>

  <button onclick="registarToner()">Disponível</button>
</div>

<!-- STOCK -->
<div id="stock" style="display:none">
  <input id="pesquisa" onkeyup="filtrarStock()" placeholder="Pesquisar">
  <div id="listaStock"></div>
  <button onclick="exportarStock()">Exportar</button>
</div>

<!-- MANUTENÇÃO -->
<div id="manutencao" style="display:none">
  <input id="equipamentoM" placeholder="Equipamento">
  <input id="localizacaoM" placeholder="Local">
  <input id="descricaoM" placeholder="Descrição">
  <input id="dataM" type="date">
  <button onclick="guardarManutencao()">Guardar</button>
</div>

<!-- HISTÓRICO -->
<div id="historico" style="display:none">
  <table>
    <thead>
      <tr>
        <th>Equipamento</th>
        <th>Local</th>
        <th>Descrição</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody id="tabelaManutencao"></tbody>
  </table>
  <button onclick="exportarManutencoes()">Exportar</button>
</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
