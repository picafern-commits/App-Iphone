<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>App Empresa</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f2f2f7;
}

.container{
  padding:15px;
  padding-bottom:120px;
}

select,input,button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  background:#007AFF;
  color:white;
  border:none;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.check{
  display:flex;
  align-items:center;
  margin-bottom:8px;
}
.check input{
  width:auto;
  margin-right:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- IMPRESSORAS -->
<div id="impressoras">

<h2>Registo Toners</h2>

<select id="equipamento">
<option value="">Equipamento</option>
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option value="">Localização</option>
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
</select>

<select id="cor">
<option value="">Cor</option>
<option>Preto</option>
<option>Cyan</option>
<option>Magenta</option>
<option>Amarelo</option>
</select>

<input type="date" id="data">

<button onclick="disponivel()">Disponível</button>

<h3>Stock</h3>
<div id="listaStock"></div>

<h3>Histórico</h3>
<div id="listaHistorico"></div>

</div>

<!-- INSTALAÇÃO PC -->
<div id="instalacao" style="display:none">

<h2>Instalação Computador</h2>

<input type="text" id="nomePC" placeholder="Nome do Computador">

<div id="checklist"></div>

<button onclick="guardarInstalacao()">Guardar</button>

</div>

<!-- HISTÓRICO PC -->
<div id="historicoPC" style="display:none">

<h2>Histórico Instalações</h2>
<div id="listaPC"></div>

</div>

</div>

<nav>
<button onclick="mudarPagina('impressoras')">🖨️</button>
<button onclick="mudarPagina('instalacao')">💻</button>
<button onclick="mudarPagina('historicoPC')">📋</button>
</nav>

<script src="app.js"></script>

</body>
</html>
