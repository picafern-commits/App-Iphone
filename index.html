<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toner Manager</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
</head>
<body>

<div class="header">Toner Manager</div>

<div class="container">

<!-- Página 1: Registo Toners -->
<div id="registo" class="card">
<h3>Registo Toners</h3>

<select id="equipamento">
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacao">
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
<option>Ilha 4 - R4B1293179</option>
<option>Ilha 5 - R4B1293180</option>
<option>Balcão 1 - R4B1293183</option>
<option>Balcão 2 - R4B1293184</option>
<option>Dep.Logistica - R4B2230012</option>
<option>Grandes.Encomendas - R4B1293173</option>
<option>Devoluções - R4B1395261</option>
<option>Escritório - RVP0ZZ03770</option>
<option>Ilha1-VRL - R4B1293169</option>
<option>Ilha2-VRL - R4B1293174</option>
<option>Ilha3-VRL - RVP0Z03715</option>
</select>

<select id="cor">
<option>Preto</option>
<option>Amarelo</option>
<option>Azul</option>
<option>Vermelho</option>
</select>

<button onclick="movimento('entrada')">Disponível</button>
<button onclick="abrirScanner()">📷 Scanner</button>
<div id="reader" style="width:100%; margin-top:10px;"></div>
</div>

<!-- Página 2: Stock Toners -->
<div id="stock" class="card" style="display:none;">
<h3>Stock Toners</h3>
<input type="text" id="pesquisa" placeholder="Pesquisar..." oninput="filtrarStock()">
<div id="listaStock"></div>
<button onclick="exportarExcel()">Exportar Excel</button>
</div>

<!-- Página 3: Manutenção Impressoras -->
<div id="manutencao" class="card" style="display:none;">
<h3>Manutenção Impressoras</h3>

<select id="equipamentoM">
<option>P3155DN</option>
<option>TASKalfa_255ci</option>
<option>PA5500x</option>
</select>

<select id="localizacaoM">
<option>Ilha 1 - R4B2229805</option>
<option>Ilha 2 - WD44336210</option>
<option>Ilha 3 - R4B1395508</option>
<option>Ilha 4 - R4B1293179</option>
<option>Ilha 5 - R4B1293180</option>
<option>Balcão 1 - R4B1293183</option>
<option>Balcão 2 - R4B1293184</option>
<option>Dep.Logistica - R4B2230012</option>
<option>Grandes.Encomendas - R4B1293173</option>
<option>Devoluções - R4B1395261</option>
<option>Escritório - RVP0ZZ03770</option>
<option>Ilha1-VRL - R4B1293169</option>
<option>Ilha2-VRL - R4B1293174</option>
<option>Ilha3-VRL - RVP0Z03715</option>
</select>

<textarea id="descricaoM" placeholder="Descrição da manutenção"></textarea>
<input type="date" id="dataM">
<button onclick="guardarManutencao()">Guardar</button>
</div>

<!-- Página 4: Histórico Manutenções -->
<div id="historico" class="card" style="display:none;">
<h3>Histórico Manutenções</h3>
<table>
<thead>
<tr>
<th>Equipamento</th>
<th>Local</th>
<th>Descrição</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tabelaManutencao"></tbody>
</table>
</div>

</div>

<!-- Navbar -->
<div class="bottom-nav">
<a onclick="mudarPagina('registo')" class="active"><i class="fas fa-box"></i><br>Registo</a>
<a onclick="mudarPagina('stock')"><i class="fas fa-warehouse"></i><br>Stock</a>
<a onclick="mudarPagina('manutencao')"><i class="fas fa-screwdriver-wrench"></i><br>Manut.</a>
<a onclick="mudarPagina('historico')"><i class="fas fa-clock"></i><br>Hist.</a>
</div>

<script src="script.js"></script>
</body>
</html>
