.dark{
  background:#1c1c1e;
  color:white;
}

.container{
  padding:20px;
  padding-bottom:120px;
}

/* INPUTS */
select,input,button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box; /* 🔥 evita sair do ecrã */
}

button{
  background:#007AFF;
  color:white;
  border:none;
}

/* CARDS */
.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.dark .card{
  background:#2c2c2e;
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.delete{
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  font-size:16px;
}
