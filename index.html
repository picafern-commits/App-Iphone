
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>iPhone QR App</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body{font-family:Arial;text-align:center;background:#0f172a;color:white}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#3b82f6;color:white}
</style>
</head>
<body>

<h2>App Braga - iPhone</h2>

<input id="serie" placeholder="Série"><br>
<input id="local" placeholder="Local"><br>

<input type="file" id="foto"><br><br>

<button onclick="gerar()">Gerar QR + Word</button>

<br><br>
<div id="qrcode"></div>

<script>
function gerar(){
 const serie=document.getElementById('serie').value;
 const local=document.getElementById('local').value;
 const data=new Date().toLocaleDateString();

 const payload={serie,local,data};

 const json=JSON.stringify(payload);

 document.getElementById("qrcode").innerHTML="";
 QRCode.toCanvas(document.createElement('canvas'),json,function(err,canvas){
   document.getElementById("qrcode").appendChild(canvas);
 });

 // download "word" (txt simplificado)
 const content=`LOCAL: ${local}\nSERIE: ${serie}\nDATA: ${data}`;
 const blob=new Blob([content],{type:"application/msword"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="Etiqueta.doc";
 a.click();
}
</script>

</body>
</html>
